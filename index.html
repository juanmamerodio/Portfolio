
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nova Hotels | Experiencia Premium</title>
    <!-- Tailwind + Lucide + LocalForage (DB avanzada) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animaciones mejoradas */
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        .slide-up { animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
        .scale-in { animation: scaleIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        /* efecto shimmer para carga */
        .shimmer { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        /* ripple effect botones */
        .btn-ripple { position: relative; overflow: hidden; transition: all 0.2s; }
        .btn-ripple:active { transform: scale(0.97); }
        
        /* badge glow */
        .glow-badge { box-shadow: 0 0 8px rgba(59,130,246,0.4); }
        
        /* transiciones suaves */
        .card-hover { transition: all 0.25s ease; }
        .card-hover:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-gray-50 font-sans antialiased no-scrollbar selection:bg-blue-200">

    <div id="app-root" class="min-h-screen relative"></div>

    <script type="module">
        // --------------------------------------------------------------
        //  SISTEMA COMPLETO: Home, Reservas, Pago Anticipado (CBU aleatorio)
        //  Base de datos: IndexedDB (localforage) + fallback a localStorage
        //  Soporte multi-idioma (Español/Inglés)
        //  Animaciones fluidas, corrección de bugs, persistencia total
        // --------------------------------------------------------------
        
        import { createIcons, icons } from 'https://unpkg.com/lucide@latest/dist/lucide.esm.js';
        window.lucideIcons = icons;
        
        // ---------- 1. CONFIGURACIÓN IDIOMAS ----------
        const translations = {
            es: {
                home: "Inicio", explore: "Explorar", bookings: "Reservas", profile: "Perfil",
                welcome: "Bienvenido a Nova Hotels", slogan: "Elegancia y confort en cada estancia",
                featured: "Servicios Premium", wifi: "WiFi Ultra Rápido", spa: "Spa & Wellness", restaurant: "Restaurante Gourmet",
                exploreRooms: "Nuestras habitaciones", payEarly: "Pagar anticipadamente", cancelRes: "Cancelar reserva",
                payNow: "Pagar ahora", paid: "Pagado", unpaid: "Pendiente", randomCbu: "CBU Aleatorio",
                confirmPayment: "Confirmar Pago", simulatingPayment: "Simular transferencia", totalToPay: "Total a pagar",
                paymentSuccess: "Pago registrado con éxito", paymentFailed: "Error en pago", cbuInfo: "CBU para transferencia",
                checkIn: "Entrada", checkOut: "Salida", guestName: "Nombre completo", reserve: "Reservar",
                available: "Disponible", occupied: "Ocupado", invalidDates: "Fechas inválidas",
                noBookings: "No tenés reservas activas", bookNow: "Reservar ahora", logout: "Cerrar Sesión",
                loginGoogle: "Continuar con Google", orContinue: "o continuar como invitado", 
                changeLanguage: "Idioma", nights: "noches", cbuRandom: "CBU generado"
            },
            en: {
                home: "Home", explore: "Explore", bookings: "My Bookings", profile: "Profile",
                welcome: "Welcome to Nova Hotels", slogan: "Elegance and comfort in every stay",
                featured: "Premium Services", wifi: "Ultra Fast WiFi", spa: "Spa & Wellness", restaurant: "Gourmet Restaurant",
                exploreRooms: "Our Rooms", payEarly: "Pay in advance", cancelRes: "Cancel booking",
                payNow: "Pay now", paid: "Paid", unpaid: "Pending", randomCbu: "Random CBU",
                confirmPayment: "Confirm Payment", simulatingPayment: "Simulate transfer", totalToPay: "Total to pay",
                paymentSuccess: "Payment successfully recorded", paymentFailed: "Payment failed", cbuInfo: "CBU for transfer",
                checkIn: "Check-in", checkOut: "Check-out", guestName: "Full name", reserve: "Book now",
                available: "Available", occupied: "Occupied", invalidDates: "Invalid dates",
                noBookings: "You have no active bookings", bookNow: "Book now", logout: "Logout",
                loginGoogle: "Continue with Google", orContinue: "or continue as guest",
                changeLanguage: "Language", nights: "nights", cbuRandom: "Generated CBU"
            }
        };
        
        let currentLang = localStorage.getItem('app_lang') || 'es';
        function t(key) { return translations[currentLang][key] || key; }
        
        // ---------- 2. DATOS DE HABITACIONES ----------
        const HOTEL_ROOMS = [
            { id: '101', name: { es: 'Suite Presidencial', en: 'Presidential Suite' }, type: 'Suite', capacity: '4 personas', price: 250, image: 'https://images.unsplash.com/photo-1578683010236-d716f9a3f461?auto=format&fit=crop&q=80&w=400' },
            { id: '102', name: { es: 'Doble Premium', en: 'Premium Double' }, type: 'Doble', capacity: '2 personas', price: 120, image: 'https://images.unsplash.com/photo-1560185016-3ae1746b412e?auto=format&fit=crop&q=80&w=400' },
            { id: '103', name: { es: 'Familiar Deluxe', en: 'Family Deluxe' }, type: 'Familiar', capacity: '6 personas', price: 180, image: 'https://images.unsplash.com/photo-1582719478250-c8940994cb4e?auto=format&fit=crop&q=80&w=400' },
            { id: '201', name: { es: 'Simple Business', en: 'Business Single' }, type: 'Simple', capacity: '1 persona', price: 80, image: 'https://images.unsplash.com/photo-1631049307264-da0ec9d70304?auto=format&fit=crop&q=80&w=400' },
        ];
        
        const today = new Date().toISOString().split('T')[0];
        const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
        
        // ---------- 3. ESTADO GLOBAL ----------
        let state = {
            user: null,           // { uid, displayName, email, isGuest }
            bookings: [],
            activeTab: 'home',    // home, explore, bookings, profile
            loading: true,
            searchDates: { checkIn: today, checkOut: tomorrow },
            bookingModal: { isOpen: false, room: null },
            guestName: '',
            isSubmitting: false,
            paymentModal: { open: false, bookingId: null, cbu: '', amount: 0 },
            toastMsg: null
        };
        
        // helpers
        function showToast(message, type = 'success') {
            state.toastMsg = { message, type };
            renderApp();
            setTimeout(() => { state.toastMsg = null; renderApp(); }, 2800);
        }
        
        // ----- 4. BASE DE DATOS LOCAL (IndexedDB + localforage) -----
        const dbBookings = localforage.createInstance({ name: "NovaHotel", storeName: "bookings" });
        const dbUser = localforage.createInstance({ name: "NovaHotel", storeName: "user" });
        
        async function loadUser() {
            let user = await dbUser.getItem('currentUser');
            if (!user) {
                user = { uid: 'guest_' + Math.random().toString(36).substr(2, 8), displayName: 'Viajero', email: 'guest@novahotel.com', isGuest: true, avatar: '👤' };
                await dbUser.setItem('currentUser', user);
            }
            return user;
        }
        
        async function saveUser(user) {
            await dbUser.setItem('currentUser', user);
        }
        
        async function loadBookings(userId) {
            const allBookings = await dbBookings.getItem('all_bookings') || [];
            const userBookings = allBookings.filter(b => b.userId === userId);
            return userBookings;
        }
        
        async function saveAllBookings(bookings) {
            await dbBookings.setItem('all_bookings', bookings);
        }
        
        async function addBookingToDB(booking) {
            const all = await dbBookings.getItem('all_bookings') || [];
            const newBooking = { ...booking, id: Date.now().toString() + Math.random().toString(36).substr(2, 4) };
            all.push(newBooking);
            await saveAllBookings(all);
            return newBooking;
        }
        
        async function updateBookingInDB(bookingId, updates) {
            let all = await dbBookings.getItem('all_bookings') || [];
            const index = all.findIndex(b => b.id === bookingId);
            if (index !== -1) {
                all[index] = { ...all[index], ...updates };
                await saveAllBookings(all);
                return true;
            }
            return false;
        }
        
        async function deleteBookingFromDB(bookingId) {
            let all = await dbBookings.getItem('all_bookings') || [];
            const filtered = all.filter(b => b.id !== bookingId);
            await saveAllBookings(filtered);
            return true;
        }
        
        // refresh state desde DB
        async function refreshData() {
            if (!state.user) return;
            const freshBookings = await loadBookings(state.user.uid);
            state.bookings = freshBookings.sort((a,b) => new Date(a.checkIn) - new Date(b.checkIn));
            state.loading = false;
            renderApp();
        }
        
        // ---------- 5. LOGICA DE DISPONIBILIDAD ----------
        function getRoomStatus(roomId, checkIn, checkOut, excludeBookingId = null) {
            if (!checkIn || !checkOut || checkIn >= checkOut) return { available: false, reason: 'invalid' };
            const overlapping = state.bookings.find(b => 
                b.roomId === roomId && 
                b.id !== excludeBookingId &&
                b.checkIn < checkOut && 
                b.checkOut > checkIn
            );
            if (overlapping) return { available: false, bookedBy: overlapping.guestName };
            return { available: true };
        }
        
        // ---------- 6. NAVEGACIÓN Y MODALES ----------
        window.setTab = (tab) => { state.activeTab = tab; renderApp(); };
        window.updateDate = (field, value) => { state.searchDates[field] = value; renderApp(); };
        window.updateName = (value) => { state.guestName = value; renderApp(); };
        window.openModal = (roomId) => {
            const room = HOTEL_ROOMS.find(r => r.id === roomId);
            state.bookingModal = { isOpen: true, room };
            state.guestName = '';
            renderApp();
        };
        window.closeModal = () => { if (!state.isSubmitting) { state.bookingModal = { isOpen: false, room: null }; renderApp(); } };
        
        // Cancelar con confirmación
        window.handleCancelBooking = async (bookingId) => {
            if (!confirm(t('cancelRes') + "? Esta acción no se puede deshacer.")) return;
            await deleteBookingFromDB(bookingId);
            await refreshData();
            showToast("✅ Reserva cancelada", "success");
        };
        
        // PAGAR ANTES DE TIEMPO con CBU aleatorio
        function generateRandomCBU() {
            const parts = [Math.floor(Math.random()*9999), Math.floor(Math.random()*999999), Math.floor(Math.random()*99999999)];
            return `CBU: ${parts[0].toString().padStart(4,'0')}-${parts[1].toString().padStart(6,'0')}-${parts[2].toString().padStart(8,'0')}`;
        }
        
        window.openPaymentModal = (bookingId, amount) => {
            const cbu = generateRandomCBU();
            state.paymentModal = { open: true, bookingId, cbu, amount };
            renderApp();
        };
        
        window.closePaymentModal = () => {
            state.paymentModal = { open: false, bookingId: null, cbu: '', amount: 0 };
            renderApp();
        };
        
        window.confirmPayment = async () => {
            const { bookingId, amount } = state.paymentModal;
            if (!bookingId) return;
            const success = await updateBookingInDB(bookingId, { paid: true, paymentDate: new Date().toISOString(), paidAmount: amount });
            if (success) {
                showToast(`💰 ${t('paymentSuccess')} - ${t('randomCbu')}: ${state.paymentModal.cbu}`, "success");
                await refreshData();
            } else {
                showToast(`❌ ${t('paymentFailed')}`, "error");
            }
            closePaymentModal();
        };
        
        // Reservar habitación (con validación de disponibilidad real)
        window.handleBookRoom = async (e) => {
            e.preventDefault();
            if (!state.user || !state.guestName.trim() || !state.bookingModal.room) return;
            const room = state.bookingModal.room;
            const { checkIn, checkOut } = state.searchDates;
            if (checkIn >= checkOut) { showToast("❌ Fechas inválidas", "error"); return; }
            const status = getRoomStatus(room.id, checkIn, checkOut);
            if (!status.available) { showToast(`⚠️ Habitación no disponible (${status.bookedBy || 'ocupada'})`, "error"); return; }
            
            state.isSubmitting = true;
            renderApp();
            
            const newBooking = {
                roomId: room.id,
                roomName: currentLang === 'es' ? room.name.es : room.name.en,
                guestName: state.guestName.trim(),
                checkIn, checkOut,
                userId: state.user.uid,
                createdAt: new Date().toISOString(),
                paid: false,
                paymentDate: null,
                pricePerNight: room.price,
                totalAmount: room.price * (Math.ceil((new Date(checkOut) - new Date(checkIn)) / (1000*60*60*24)))
            };
            
            await addBookingToDB(newBooking);
            await refreshData();
            state.isSubmitting = false;
            state.guestName = '';
            state.bookingModal = { isOpen: false, room: null };
            state.activeTab = 'bookings';
            showToast(`✨ ${t('reserve')} confirmada`, "success");
            renderApp();
        };
        
        // LOGIN SIMULADO + GOOGLE MOCK (multilenguaje y persistente)
        window.handleGoogleLogin = async () => {
            const mockNames = ['Carlos Méndez', 'Lucía Fuentes', 'Mateo Rivas', 'Valentina Paz'];
            const randomName = mockNames[Math.floor(Math.random() * mockNames.length)];
            const newUser = {
                uid: 'google_' + Date.now(),
                displayName: randomName,
                email: `${randomName.toLowerCase().replace(' ', '.')}@gmail.com`,
                isGuest: false,
                avatar: 'G'
            };
            await saveUser(newUser);
            state.user = newUser;
            await refreshData();
            showToast(`👋 Bienvenido ${newUser.displayName}`, "success");
            state.activeTab = 'home';
            renderApp();
        };
        
        window.handleLogout = async () => {
            const guestUser = { uid: 'guest_' + Math.random().toString(36).substr(2, 8), displayName: 'Viajero', email: 'guest@novahotel.com', isGuest: true, avatar: '👤' };
            await saveUser(guestUser);
            state.user = guestUser;
            await refreshData();
            showToast("🔓 Sesión cerrada", "info");
            state.activeTab = 'home';
            renderApp();
        };
        
        window.setLanguage = (lang) => {
            currentLang = lang;
            localStorage.setItem('app_lang', lang);
            renderApp();
        };
        
        // ---------- 7. RENDER COMPLETO (HOME + EXPLORE + BOOKINGS + PROFILE) ----------
        function renderHome() {
            const roomCount = HOTEL_ROOMS.length;
            const lang = currentLang;
            return `
                <div class="space-y-6 fade-in">
                    <div class="relative rounded-3xl overflow-hidden h-56 shadow-lg">
                        <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover" alt="hotel">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex flex-col justify-end p-6">
                            <h2 class="text-2xl font-bold text-white">${t('welcome')}</h2>
                            <p class="text-white/80">${t('slogan')}</p>
                        </div>
                    </div>
                    <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100">
                        <h3 class="text-xl font-bold text-gray-800 mb-4">✨ ${t('featured')}</h3>
                        <div class="grid grid-cols-3 gap-4 text-center">
                            <div><i data-lucide="wifi" class="w-7 h-7 text-blue-500 mx-auto mb-2"></i><p class="text-xs font-medium">${t('wifi')}</p></div>
                            <div><i data-lucide="sparkles" class="w-7 h-7 text-blue-500 mx-auto mb-2"></i><p class="text-xs font-medium">${t('spa')}</p></div>
                            <div><i data-lucide="utensils" class="w-7 h-7 text-blue-500 mx-auto mb-2"></i><p class="text-xs font-medium">${t('restaurant')}</p></div>
                        </div>
                    </div>
                    <div class="bg-gradient-to-r from-blue-50 to-indigo-50 rounded-3xl p-6 border border-blue-100">
                        <p class="text-gray-700 text-sm leading-relaxed">🌟 Disfrutá de una experiencia única con vista al mar, piscina climatizada y servicio de conserjería 24/7. Pagá anticipadamente con CBU aleatorio y obtené beneficios exclusivos.</p>
                    </div>
                </div>
            `;
        }
        
        function renderExplore() {
            const { checkIn, checkOut } = state.searchDates;
            const isInvalid = checkIn >= checkOut;
            return `
                <div class="space-y-6 fade-in">
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                        <div class="flex flex-col sm:flex-row gap-4">
                            <div class="flex-1"><label class="text-xs font-bold text-gray-500">${t('checkIn')}</label><input type="date" value="${checkIn}" onchange="window.updateDate('checkIn', this.value)" min="${today}" class="w-full bg-gray-50 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500"></div>
                            <div class="flex-1"><label class="text-xs font-bold text-gray-500">${t('checkOut')}</label><input type="date" value="${checkOut}" onchange="window.updateDate('checkOut', this.value)" min="${checkIn || today}" class="w-full bg-gray-50 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500"></div>
                        </div>
